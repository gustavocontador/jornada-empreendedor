# Nixpacks build configuration for Railway deployment
# Docs: https://nixpacks.com/docs

[phases.setup]
nixPkgs = ['python312', 'postgresql', 'gcc', 'libffi']

[phases.install]
cmds = [
    'pip install --upgrade pip setuptools wheel',
    'pip install --no-cache-dir -r requirements-dev.txt'
]

[start]
cmd = 'uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4 --log-level info'
