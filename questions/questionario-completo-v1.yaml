# QUESTIONÁRIO COMPLETO - Jornada do Empreendedor de Sucesso
# Versão 1.0.0
# Total: ~105 perguntas otimizadas
# Tempo estimado: 30-35 minutos

metadata:
  nome: "Jornada do Empreendedor de Sucesso"
  versao: "1.0.0"
  total_perguntas: 105
  tempo_estimado_minutos: 35
  frameworks_incluidos:
    - DISC
    - Espiral Dinâmica
    - Valores Empresariais (10)
    - PAEI (Adizes)
    - Eneagrama
    - Arquétipos de Contratação

# SEÇÕES DO QUESTIONÁRIO

secoes:
  - id: "intro"
    nome: "Informações Iniciais"
    descricao: "Contexto sobre você e seu negócio"
    ordem: 1
    tempo_estimado: "3 min"
    total_perguntas: 5

  - id: "comportamento_valores"
    nome: "Comportamento e Valores Pessoais"
    descricao: "Como você age e o que valoriza"
    ordem: 2
    tempo_estimado: "10 min"
    total_perguntas: 35
    frameworks: ["DISC", "Espiral", "PAEI parcial"]

  - id: "gestao_lideranca"
    nome: "Gestão e Liderança"
    descricao: "Seu estilo de liderança e gestão"
    ordem: 3
    tempo_estimado: "8 min"
    total_perguntas: 25
    frameworks: ["PAEI", "Eneagrama parcial", "DISC parcial"]

  - id: "motivacoes_profundas"
    nome: "Motivações e Autossabotagem"
    descricao: "O que te move e o que te bloqueia"
    ordem: 4
    tempo_estimado: "8 min"
    total_perguntas: 20
    frameworks: ["Eneagrama", "Espiral parcial"]

  - id: "valores_cultura"
    nome: "Valores Empresariais e Cultura"
    descricao: "Valores que você prioriza e perfil que busca contratar"
    ordem: 5
    tempo_estimado: "6 min"
    total_perguntas: 20
    frameworks: ["Valores", "Arquétipos"]

