    ordem: 1
    texto: "Qual é o seu nome completo?"
    tipo: "text"
    obrigatorio: true
    pontuacao: null

  - id: "q002"
    secao: "intro"
    ordem: 2
    texto: "Há quantos anos você é empreendedor?"
    tipo: "multiple_choice"
    obrigatorio: true
    opcoes:
      - value: "menos_1"
        label: "Menos de 1 ano"
      - value: "1_3"
        label: "1 a 3 anos"
      - value: "3_5"
        label: "3 a 5 anos"
      - value: "5_10"
        label: "5 a 10 anos"
      - value: "mais_10"
        label: "Mais de 10 anos"
    pontuacao: null

  - id: "q003"
    secao: "intro"
    ordem: 3
    texto: "Quantas pessoas trabalham na sua empresa atualmente?"
    tipo: "multiple_choice"
    obrigatorio: true
    opcoes:
      - value: "solo"
        label: "Só eu (empreendedor solo)"
      - value: "2_5"
        label: "2 a 5 pessoas"
      - value: "6_10"
        label: "6 a 10 pessoas"
      - value: "11_20"
        label: "11 a 20 pessoas"
      - value: "21_50"
        label: "21 a 50 pessoas"
      - value: "mais_50"
        label: "Mais de 50 pessoas"
    pontuacao: null

  - id: "q004"
    secao: "intro"
    ordem: 4
    texto: "Qual é o seu principal desafio hoje como empreendedor?"
    tipo: "multiple_choice"
    obrigatorio: true
    opcoes:
      - value: "pessoas"
        label: "Gestão de pessoas (contratar, delegar, liderar)"
      - value: "financeiro"
        label: "Gestão financeira e tributária"
      - value: "vendas"
        label: "Vendas e captação de clientes"
      - value: "operacional"
        label: "Operação e processos"
      - value: "estrategia"
        label: "Estratégia e direcionamento"
      - value: "tempo"
        label: "Gestão do tempo e produtividade"
    pontuacao:
